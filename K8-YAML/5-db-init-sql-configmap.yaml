data:
  init.sql: |
    IF DB_ID('ProductDb') IS NULL
    BEGIN
      CREATE DATABASE ProductDb;
    END
    GO

    USE ProductDb;
    GO

    IF OBJECT_ID('Products', 'U') IS NULL
    BEGIN
      CREATE TABLE Products
      (
          Id INT PRIMARY KEY,
          Name NVARCHAR(100),
          Price DECIMAL(18,2),
          Category NVARCHAR(50),
          Brand NVARCHAR(50),
          StockQuantity INT,
          ManufactureDate DATE,
          ExpiryDate DATE NULL,
          IsActive BIT
      );

      INSERT INTO Products 
