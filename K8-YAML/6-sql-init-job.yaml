apiVersion: batch/v1
kind: Job
metadata:
  name: sql-init-job
  namespace: k8-nagp-demo-ns

spec:
  backoffLimit: 5

  template:
    spec:
      restartPolicy: OnFailure

      containers:
      - name: sql-init
        image: mcr.microsoft.com/mssql-tools

        env:
        - name: SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sql-secret
              key: DB_PASSWORD

        command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for SQL Server..."

          until /opt/mssql-tools/bin/sqlcmd \
            -S sql-service \
            -U sa \
            -P "$SA_PASSWORD" \
            -Q "SELECT 1"
          do
            sleep 5
          done

          echo "Executing init.sql..."

          /opt/mssql-tools/bin/sqlcmd \
            -S sql-service \
            -U sa \
            -P "$SA_PASSWORD" \
            -i /scripts/init.sql

        volumeMounts:
        - name: sql-script
          mountPath: /scripts

      volumes:
      - name: sql-script
        configMap:
          name: sql-init-script